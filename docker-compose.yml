services:

  app:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: app
    user: "1000:1000"
    ports:
      - "${PHP_PORT}:8000"
    env_file:
      - .env
    environment:
      OCTANE_SERVER: frankenphp
      OCTANE_HTTPS: "false"
    depends_on:
      - postgres
      - redis
    volumes:
      - "${BACKEND_PATH}:/var/www/html"

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nuxt
    ports:
      - "${NUXT_PORT}:3000"
    volumes:
      - "${FRONTEND_PATH}:/app"
    environment:
      NUXT_PUBLIC_API_BASE: http://app:8000
    depends_on:
      - app

  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always
    depends_on:
      - app
      - nuxt

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgtables:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:snapshot
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD}"
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  puml:
    image: plantuml/plantuml-server:jetty
    container_name: puml
    restart: always
    ports:
      - "${PUML_PORT}:8080"
    volumes:
      - "${PUML_PATH}:/var/www/html/uml"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: examination_worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    depends_on:
      - redis 

volumes:
  pgtables:
  pgadmin_data:
  caddy_data:
  caddy_config: